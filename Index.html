<!DOCTYPE html>
<html>
  <head>
    <!-- Основные библиотеки для работы AR и анимации -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>
    <script src="https://jsdelivr.net"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs>
      <!-- Загружаем файл куклы в память -->
      <a-assets>
        <a-asset-item id="doll" src="doll.glb"></a-asset-item>
      </a-assets>

      <!-- Когда камера видит маркер HIRO, появляется кукла -->
      <a-marker preset="hiro">
        
        
      </a-marker>

      
    </a-scene>
  </body>
</html>
